<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Offline-ready Match-3 game built with HTML/CSS/JS (PWA)." />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon-192.svg" />
    <link rel="icon" type="image/svg+xml" href="./icons/icon-192.svg" />
    <title>Match-3</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="title-block">
          <p class="badge">Match-3</p>
          <h1 data-i18n="title">Match-3</h1>
          <p data-i18n="subtitle">Tap a tile, then tap an adjacent tile to swap. Keep chains alive for bigger multipliers.</p>
        </div>

        <section class="hud" aria-label="Game status">
          <div class="score-box" id="score-box">
            <span data-i18n="score-label">Score</span>
            <strong id="score">0</strong>
          </div>

          <button id="restart" data-i18n="restart">Restart</button>

          <label for="locale" class="lang-label" data-i18n="locale-label">Language</label>
          <select id="locale">
            <option value="en">English</option>
            <option value="zh">中文</option>
            <option value="ms">Bahasa Melayu</option>
          </select>
        </section>
      </header>

      <section class="board-wrap">
        <section class="board" id="board" aria-label="Game board"></section>
      </section>

      <div class="status-area" aria-live="polite">
        <p class="hint" data-i18n="hint">Tip: install to home screen for instant play, even offline.</p>
        <p class="offline-status" id="status"></p>
      </div>
    </main>

    <script src="./app.js" defer></script>
    <script src="./sw-register.js" defer></script>
  </body>
</html>
