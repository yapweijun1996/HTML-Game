<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Offline-ready Match-3 game built with HTML/CSS/JS (PWA)." />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon-192.svg" />
    <link rel="icon" type="image/svg+xml" href="./icons/icon-192.svg" />
    <title>Match-3</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <div>
          <h1 data-i18n="title">Match-3</h1>
          <p data-i18n="subtitle">Tap a tile, then tap an adjacent tile to swap. Any line of 3 or more matching tiles is removed.</p>
          <label for="locale" class="lang-label" data-i18n="locale-label">Language</label>
          <select id="locale">
            <option value="en">English</option>
            <option value="zh">中文</option>
            <option value="ms">Bahasa Melayu</option>
          </select>
        </div>
        <div class="score-box">
          <div data-i18n="score-label">Score</div>
          <strong id="score">0</strong>
          <button id="restart" data-i18n="restart">Restart</button>
        </div>
      </header>

      <section class="board" id="board" aria-label="Game board"></section>

      <p class="hint" data-i18n="hint">Offline support enabled; install to launch from your home screen.</p>
      <p class="offline-status" id="status"></p>
    </main>

    <script src="./app.js" defer></script>
    <script src="./sw-register.js" defer></script>
  </body>
</html>
