<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="离线可玩三消游戏（PWA）" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon-192.svg" />
    <link rel="icon" type="image/svg+xml" href="./icons/icon-192.svg" />
    <title>三消 Match-3</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <div>
          <h1>三消 Match-3</h1>
          <p>点击同色砖块后再点相邻砖块即可交换，形成 3 个及以上连线会自动消除。</p>
        </div>
        <div class="score-box">
          <div>分数</div>
          <strong id="score">0</strong>
          <button id="restart">重开</button>
        </div>
      </header>

      <section class="board" id="board" aria-label="游戏棋盘"></section>

      <p class="hint">支持离线；安装后可直接从主屏启动。</p>
      <p class="offline-status" id="status"></p>
    </main>

    <script src="./app.js" defer></script>
    <script src="./sw-register.js" defer></script>
  </body>
</html>
