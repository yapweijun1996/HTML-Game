<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Offline-ready Match-3 game built with HTML/CSS/JS (PWA)." />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon-192.svg" />
    <link rel="icon" type="image/svg+xml" href="./icons/icon-192.svg" />
    <title>Match-3</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="title-block">
          <p class="badge">Match-3</p>
          <h1 data-i18n="title">Match-3</h1>
          <p data-i18n="subtitle">Tap a tile, then tap an adjacent tile to swap. Keep chains alive for bigger multipliers.</p>
          <p data-i18n="subtitle-goal">Goal: reach the target score before moves run out.</p>
        </div>

        <section class="hud" aria-label="Game status">
          <div class="stat-grid" id="score-box" role="group" aria-label="Game status">
            <div class="score-box">
              <span data-i18n="level-label">Level</span>
              <strong id="level">1</strong>
            </div>
            <div class="score-box">
              <span data-i18n="moves-left">Moves</span>
              <strong id="moves-left">0</strong>
            </div>
            <div class="score-box">
              <span data-i18n="target-score">Target</span>
              <strong id="target-score">0</strong>
            </div>
            <div class="score-box">
              <span data-i18n="goal-progress-label">Score</span>
              <strong id="goal-progress">0</strong>
            </div>
          </div>

          <div class="control-row">
            <button id="restart" data-i18n="restart">Replay Level</button>
            <button id="next-level" data-i18n="next-level" hidden>Next Level</button>
            <button id="main-menu" data-i18n="main-menu">Main Menu</button>
          </div>

          <div class="control-row">
            <button id="hint" data-i18n="hint-button">Hint</button>
            <label for="input-mode" class="mode-label" data-i18n="interaction-label">Input mode</label>
            <select id="input-mode">
              <option value="drag" data-i18n="input-mode-drag">Drag</option>
              <option value="tap" data-i18n="input-mode-tap">Tap</option>
            </select>
          </div>

          <label for="locale" class="lang-label" data-i18n="locale-label">Language</label>
          <select id="locale">
            <option value="en">English</option>
            <option value="zh">&#20013;&#25991;</option>
            <option value="ms">Bahasa Melayu</option>
          </select>
        </section>
      </header>

      <section class="board-wrap">
        <section class="board" id="board" aria-label="Game board"></section>
      </section>

      <div class="status-area">
        <p class="hint" id="status-hint"></p>
        <p class="hint" data-i18n="hint">Tip: install to home screen for instant play, even offline.</p>
        <p class="status-message" id="status" aria-live="polite"></p>
        <p class="goal-message" id="goal-message" aria-live="assertive"></p>
        <div class="achievements-wrap">
          <p data-i18n="achievement-title">Achievements</p>
          <ul id="achievements" class="achievements-list"></ul>
        </div>
      </div>
    </main>

    <script src="./js/config.js" defer></script>
    <script src="./js/i18n.js" defer></script>
    <script src="./js/modules/game-store.js" defer></script>
    <script src="./js/modules/game-ui.js" defer></script>
    <script src="./app.js" defer></script>
    <script src="./sw-register.js" defer></script>
  </body>
</html>
