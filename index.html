<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Game</title>
    <style>
      :root {
        font-family: Arial, Helvetica, sans-serif;
        color: #2c2c2c;
        background: linear-gradient(135deg, #0f172a, #1e293b);
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .shell {
        width: min(720px, calc(100vw - 32px));
        background: #ffffff;
        border-radius: 12px;
        padding: 32px;
        box-sizing: border-box;
        box-shadow: 0 14px 40px rgba(2, 6, 23, 0.25);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 30px;
      }
      p {
        margin: 0 0 22px;
        color: #334155;
        line-height: 1.5;
      }
      a {
        display: inline-block;
        text-decoration: none;
        background: #2563eb;
        color: #fff;
        padding: 12px 18px;
        border-radius: 8px;
      }
      a:hover {
        background: #1d4ed8;
      }
      .small {
        margin-top: 14px;
        font-size: 13px;
        color: #64748b;
      }
      .game-links {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .game-links a {
        flex: 1 1 auto;
        text-align: center;
      }
      .game-links a.secondary {
        background: #7c3aed;
      }
      .game-links a.secondary:hover {
        background: #6d28d9;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <h1>HTML Game</h1>
      <p>PWA games built with HTML/CSS/JS. Install any game for an app-like offline experience.</p>
      <div class="game-links">
        <a href="./match3/">Match-3</a>
        <a href="./flappy/" class="secondary">Flappy Bird</a>
      </div>
      <div class="small">Works on mobile and desktop; game assets are in <code>match3/</code> and <code>flappy/</code>.</div>
    </main>
  </body>
</html>
